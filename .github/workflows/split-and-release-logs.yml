name: Split Logs & Create Release

on:
  push:
    paths:
      - 'smmoscaler-logs.json'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: split-logs
  cancel-in-progress: true

jobs:
  split-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Split logs
        id: split
        run: |
          python scripts/split_logs.py | tee split_output.json
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat split_output.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gather release info
        id: info
        run: |
          python3 << 'PYEOF'
          import json, os, glob

          split = json.loads(os.environ.get('SPLIT_RESULT', '{}'))
          files = sorted(glob.glob('smmoscaler-logs*.json'))
          total_bytes = sum(os.path.getsize(f) for f in files)
          total_mb = f"{total_bytes / 1048576:.2f}"
          file_count = len(files)
          was_split = split.get('split', False)
          chunk_count = split.get('chunks', 1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"total_mb={total_mb}\n")
              out.write(f"file_count={file_count}\n")
              out.write(f"was_split={was_split}\n")
              out.write(f"chunk_count={chunk_count}\n")
              out.write(f"file_list={' '.join(files)}\n")

          print(f"Files: {file_count}, Size: {total_mb}MB, Split: {was_split}")
          PYEOF
        env:
          SPLIT_RESULT: ${{ steps.split.outputs.result }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: logs-${{ github.run_number }}
          name: "Log Release #${{ github.run_number }}"
          body: |
            **Size:** ${{ steps.info.outputs.total_mb }}MB across ${{ steps.info.outputs.file_count }} file(s)
            **Split:** ${{ steps.info.outputs.was_split }} (${{ steps.info.outputs.chunk_count }} chunk(s))
          files: ${{ steps.info.outputs.file_list }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index with release URLs
        run: |
          python3 << 'PYEOF'
          import json, glob
          from pathlib import Path

          index_path = Path("smmoscaler-logs.index.json")
          index = json.loads(index_path.read_text(encoding="utf-8"))

          repo = "${{ github.repository }}"
          tag = "logs-${{ github.run_number }}"
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          files = sorted(glob.glob("smmoscaler-logs*.json"))
          files = [f for f in files if f != "smmoscaler-logs.index.json"]

          if "smmoscaler-logs.json" in files:
              files.remove("smmoscaler-logs.json")
              files.insert(0, "smmoscaler-logs.json")

          index["files"] = [f"{base_url}/{f}" for f in files]
          index["source"] = "github-releases"

          index_path.write_text(json.dumps(index, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          print(f"Updated index: {len(files)} files")
          PYEOF

      - name: Commit and push index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add smmoscaler-logs.index.json smmoscaler-logs*.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "ci: update log index [skip ci]"
          git push

      - name: Summary
        run: |
          echo "## Log Release #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.info.outputs.total_mb }}MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Files | ${{ steps.info.outputs.file_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Split | ${{ steps.info.outputs.was_split }} |" >> $GITHUB_STEP_SUMMARY
          echo "| [Release](https://github.com/${{ github.repository }}/releases/tag/logs-${{ github.run_number }}) | logs-${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
